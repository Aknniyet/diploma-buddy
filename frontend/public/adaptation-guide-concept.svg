  <text x="684" y="486" fill="#1F2937" font-family="Arial, sans-serif" font-size="17" font-weight="700">1. Migration registration</text>
  <text x="684" y="514" fill="#5F6F7F" font-family="Arial, sans-serif" font-size="15">Complete registration as early as possible after arrival. This step is time-sensitive and should be handled before less urgent tasks.</text>

  <text x="684" y="570" fill="#1F2937" font-family="Arial, sans-serif" font-size="17" font-weight="700">2. Get your IIN</text>
  <text x="684" y="598" fill="#5F6F7F" font-family="Arial, sans-serif" font-size="15">Your IIN is needed for banking, SIM cards and many services. The guide can link this article directly to the related checklist step.</text>

